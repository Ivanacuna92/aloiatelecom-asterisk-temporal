; ============================================
; DIALPLAN ALOIA TELECOM
; Trunk: BlackTeko (ConnexCS)
; Signaling OUT: __TRUNK_IP__:5060
; Prefijo: __TRUNK_PREFIX__ + 52 (México)
; ============================================

; Contexto principal para agentes
[aloia-agents]

; === Extensiones de prueba ===

; Echo test - repite lo que dices
exten => 600,1,NoOp(Echo Test desde ${CALLERID(num)})
 same => n,Answer()
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Hangup()

; Music on Hold - música de espera
exten => 601,1,NoOp(Music on Hold Test desde ${CALLERID(num)})
 same => n,Answer()
 same => n,Playback(demo-moh)
 same => n,MusicOnHold()

; Playback test - prueba de audio
exten => 602,1,NoOp(Playback Test desde ${CALLERID(num)})
 same => n,Answer()
 same => n,Playback(hello-world)
 same => n,Playback(demo-thanks)
 same => n,Hangup()

; Anuncio de número
exten => 700,1,NoOp(Anuncio de numero desde ${CALLERID(num)})
 same => n,Answer()
 same => n,Playback(your-extension-is)
 same => n,SayDigits(${CALLERID(num)})
 same => n,Hangup()

; === Llamadas internas entre extensiones ===

; Llamadas entre extensiones 1000-1009
exten => _10XX,1,NoOp(Llamada interna de ${CALLERID(num)} a ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},30,tT)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(unavail),Playback(im-sorry)
 same => n,Playback(nbdy-avail-to-take-call)
 same => n,Hangup()
 same => n(busy),Playback(vm-nobodyavail)
 same => n,Hangup()

; === Llamadas salientes a números externos ===
; Prefijo del proveedor: __TRUNK_PREFIX__ + 52 (código México)

; Llamadas con código completo de México: 52 + 10 dígitos
; Ejemplo: 525592257021 -> __TRUNK_PREFIX____COUNTRY_CODE__5592257021
exten => _52XXXXXXXXXX,1,NoOp(Llamada saliente: ${CALLERID(num)} -> ${EXTEN})
 same => n,Set(NUMERO_COMPLETO=__TRUNK_PREFIX__${EXTEN})
 same => n,Set(CALLERID(name)=AloiaTelecom)
 same => n,NoOp(Marcando con prefijo: ${NUMERO_COMPLETO})
 same => n,Dial(PJSIP/${NUMERO_COMPLETO}@__TRUNK_NAME__,60,tT)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(unavail),Playback(all-circuits-busy-now)
 same => n,Playback(pls-try-call-later)
 same => n,Hangup()
 same => n(busy),Playback(tt-allbusy)
 same => n,Hangup()

; Llamadas con prefijo 9 + 10 dígitos
; Ejemplo: 95592257021 -> __TRUNK_PREFIX____COUNTRY_CODE__ + 5592257021
exten => _9XXXXXXXXXX,1,NoOp(Llamada con prefijo 9: ${CALLERID(num)} -> ${EXTEN})
 same => n,Set(NUMERO=${EXTEN:1})
 same => n,Set(NUMERO_COMPLETO=__TRUNK_PREFIX____COUNTRY_CODE__${NUMERO})
 same => n,Set(CALLERID(name)=AloiaTelecom)
 same => n,NoOp(Marcando: ${NUMERO_COMPLETO})
 same => n,Dial(PJSIP/${NUMERO_COMPLETO}@__TRUNK_NAME__,60,tT)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(unavail),Playback(all-circuits-busy-now)
 same => n,Playback(pls-try-call-later)
 same => n,Hangup()
 same => n(busy),Playback(tt-allbusy)
 same => n,Hangup()

; Llamadas directas con 10 dígitos (se agrega prefijo del proveedor + 52)
; Ejemplo: 7712162758 -> __TRUNK_PREFIX____COUNTRY_CODE__7712162758
; Patrón: primer dígito entre 2-9, luego 9 dígitos más
exten => _[2-9]XXXXXXXXX,1,NoOp(Llamada directa 10 dígitos: ${CALLERID(num)} -> ${EXTEN})
 same => n,Set(NUMERO_COMPLETO=__TRUNK_PREFIX____COUNTRY_CODE__${EXTEN})
 same => n,Set(CALLERID(name)=AloiaTelecom)
 same => n,NoOp(Agregando prefijo __TRUNK_PREFIX____COUNTRY_CODE__ - Marcando: ${NUMERO_COMPLETO})
 same => n,Dial(PJSIP/${NUMERO_COMPLETO}@__TRUNK_NAME__,60,tT)
 same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?busy:unavail)
 same => n(unavail),Playback(all-circuits-busy-now)
 same => n,Playback(pls-try-call-later)
 same => n,Hangup()
 same => n(busy),Playback(tt-allbusy)
 same => n,Hangup()

; Números de emergencia (sin prefijo, directos)
exten => 911,1,NoOp(Llamada de emergencia desde ${CALLERID(num)})
 same => n,Dial(PJSIP/911@__TRUNK_NAME__,30)
 same => n,Hangup()

; ============================================

; Contexto para llamadas entrantes desde el trunk
[from-trunk]

; DID Principal: +52 775 980 2565
exten => 527759802565,1,NoOp(===== LLAMADA ENTRANTE AL DID PRINCIPAL =====)
 same => n,NoOp(Desde: ${CALLERID(num)} | Hacia: ${EXTEN})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(welcome)
 same => n,NoOp(Transfiriendo a extension 1001)
 same => n,Dial(PJSIP/1001,30,tT)
 same => n,NoOp(Estado de llamada: ${DIALSTATUS})
 same => n,GotoIf($["${DIALSTATUS}" = "NOANSWER"]?noanswer:unavail)
 same => n(noanswer),Playback(im-sorry)
 same => n,Playback(nbdy-avail-to-take-call)
 same => n,Hangup()
 same => n(unavail),Playback(im-sorry)
 same => n,Playback(nbdy-avail-to-take-call)
 same => n,Hangup()

; Variaciones del DID (por si el trunk lo envía diferente)
exten => 7759802565,1,Goto(from-trunk,527759802565,1)
exten => 5277759802565,1,Goto(from-trunk,527759802565,1)

; Cualquier otra llamada entrante (fallback)
exten => _X.,1,NoOp(Llamada entrante genérica: ${CALLERID(num)} -> ${EXTEN})
 same => n,Answer()
 same => n,Playback(welcome)
 same => n,Dial(PJSIP/1001,30,tT)
 same => n,Hangup()

; Sin destino específico
exten => s,1,NoOp(Llamada sin destino específico)
 same => n,Answer()
 same => n,Playback(im-sorry)
 same => n,Dial(PJSIP/1001,30,tT)
 same => n,Hangup()

; ============================================
; SUPERVISIÓN - SPY Y WHISPER
; ============================================

; Contexto para escucha silenciosa (spy)
; El supervisor escucha pero no puede hablar
[spy]
exten => s,1,NoOp(=== SPY SESSION ===)
 same => n,NoOp(Target: ${SPY_TARGET})
 same => n,Set(SPYOPTS=qES(${SPY_TARGET}))
 same => n,ChanSpy(PJSIP/${SPY_TARGET},${SPYOPTS})
 same => n,Hangup()

; Extensión dinámica para spy directo
exten => _X.,1,NoOp(Spy directo a ${EXTEN})
 same => n,Set(SPY_TARGET=${EXTEN})
 same => n,ChanSpy(PJSIP/${EXTEN},qES(${EXTEN}))
 same => n,Hangup()

; Contexto para whisper (susurro)
; El supervisor puede hablar al agente, el cliente no escucha
[whisper]
exten => s,1,NoOp(=== WHISPER SESSION ===)
 same => n,NoOp(Target: ${SPY_TARGET})
 same => n,Set(SPYOPTS=wqES(${SPY_TARGET}))
 same => n,ChanSpy(PJSIP/${SPY_TARGET},${SPYOPTS})
 same => n,Hangup()

; Extensión dinámica para whisper directo
exten => _X.,1,NoOp(Whisper directo a ${EXTEN})
 same => n,Set(SPY_TARGET=${EXTEN})
 same => n,ChanSpy(PJSIP/${EXTEN},wqES(${EXTEN}))
 same => n,Hangup()

; Contexto para barge-in (intervenir en la llamada)
; El supervisor habla a ambos: agente Y cliente
[barge]
exten => s,1,NoOp(=== BARGE SESSION ===)
 same => n,NoOp(Target: ${SPY_TARGET})
 same => n,Set(SPYOPTS=BqES(${SPY_TARGET}))
 same => n,ChanSpy(PJSIP/${SPY_TARGET},${SPYOPTS})
 same => n,Hangup()

exten => _X.,1,NoOp(Barge directo a ${EXTEN})
 same => n,ChanSpy(PJSIP/${EXTEN},BqES(${EXTEN}))
 same => n,Hangup()

