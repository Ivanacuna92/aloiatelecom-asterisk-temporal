; ============================================
; DIALPLAN ALOIA TELECOM CON AMD
; Contextos para Marcadores con Deteccion de Contestadoras
; ============================================

; ============================================
; CONTEXTO: Marcador Predictivo/Progresivo
; ============================================
; AMD es OBLIGATORIO en predictivo (params dinamicos desde backend).
; En progresivo, AMD es condicional via AMD_ENABLED.
; ============================================

[aloia-dialer-amd]

exten => s,1,NoOp(=== MARCADOR PREDICTIVO: ${CAMPAIGN_ID} ===)
same => n,Set(CAMPAIGN_ID=${CAMPAIGN_ID})
same => n,Set(LEAD_ID=${LEAD_ID})
same => n,Set(CALL_ATTEMPT_ID=${CALL_ATTEMPT_ID})
same => n,Set(CDR(accountcode)=campaign_${CAMPAIGN_ID})
same => n,Answer()
; AMD CONDICIONAL: solo ejecutar si AMD_ENABLED=1
same => n,GotoIf($["${AMD_ENABLED}" = "1"]?run-amd:amd-human)
same => n(run-amd),NoOp(Ejecutando AMD con params dinamicos...)
same => n,AMD(${AMD_INITIAL_SILENCE},${AMD_GREETING},${AMD_AFTER_GREETING_SILENCE},${AMD_TOTAL_TIME},${AMD_MIN_WORD_LENGTH},${AMD_BETWEEN_WORDS_SILENCE},${AMD_MAX_WORDS},256,${AMD_MAX_WORD_LENGTH})
same => n,NoOp(AMD: ${AMDSTATUS} | ${AMDCAUSE})
same => n,Set(CHANNEL(amd_status)=${AMDSTATUS})
same => n,Set(CHANNEL(amd_cause)=${AMDCAUSE})
; Decidir segun resultado
same => n,GotoIf($["${AMDSTATUS}" = "MACHINE"]?amd-machine)
same => n,GotoIf($["${AMDSTATUS}" = "NOTSURE"]?amd-notsure)
same => n,Goto(amd-human)
; Si es MAQUINA - registrar en DB y colgar
same => n(amd-machine),NoOp(CONTESTADORA DETECTADA - ${AMDCAUSE})
same => n,Set(CDR(userfield)=AMD_MACHINE)
same => n,AGI(mark_amd_machine.py)
same => n,Hangup()
; Si NO ESTA SEGURO - tratar como humano
same => n(amd-notsure),NoOp(AMD NO SEGURO - tratando como humano)
same => n,Set(CDR(userfield)=AMD_NOTSURE)
same => n,Goto(amd-human)
; Si es HUMANO (o AMD deshabilitado) - conectar con agente
same => n(amd-human),NoOp(HUMANO DETECTADO)
same => n,Set(CDR(userfield)=AMD_HUMAN)
; Setear CallerID con el numero del cliente para que el agente lo vea
same => n,Set(CALLERID(name)=${LEAD_NAME})
same => n,Set(CALLERID(num)=${PHONE_NUMBER})
; Grabar llamada
same => n,Set(RECORD_FILE=/var/spool/asterisk/monitor/recordings/predictive-${CALL_ATTEMPT_ID})
same => n,MixMonitor(${RECORD_FILE}.wav,b)
; Buscar agente disponible via AGI
same => n(find-agent),AGI(dialer_find_agent.py)
same => n,NoOp(AGI result: AGENT_EXTENSION=${AGENT_EXTENSION})
same => n,GotoIf($["${AGENT_EXTENSION}" = ""]?wait-agent)
; Agente encontrado, conectar llamada
same => n(connect-agent),NoOp(Conectando con agente ${AGENT_EXTENSION})
same => n,Set(PJSIP_HEADER(add,Alert-Info)=answer-after=0)
same => n,Dial(PJSIP/${AGENT_EXTENSION},30,tTgb(predictive-set-header^s^1))
; Si Dial() fallo (agente no contesto, busy, etc), buscar OTRO agente
same => n,NoOp(Dial finished: DIALSTATUS=${DIALSTATUS})
same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?call-done)
; Dial fallo - liberar este agente y buscar otro
same => n,AGI(dialer_release_agent.py)
same => n,Set(AGENT_EXTENSION=)
same => n,Goto(find-agent)
; Llamada completada exitosamente
same => n(call-done),NoOp(Llamada completada con agente ${AGENT_EXTENSION})
same => n,Hangup()
; No hay agente, esperar con musica
same => n(wait-agent),NoOp(No hay agente, esperando...)
same => n,Set(WAIT_COUNT=0)
same => n(wait-loop),MusicOnHold(default,5)
same => n,Set(WAIT_COUNT=$[${WAIT_COUNT} + 5])
same => n,GotoIf($[${WAIT_COUNT} >= ${PREDICTIVE_MAX_WAIT_TIME}]?no-agent)
same => n,AGI(dialer_find_agent.py)
same => n,GotoIf($["${AGENT_EXTENSION}" != ""]?connect-agent)
same => n,Goto(wait-loop)
same => n(no-agent),NoOp(Timeout sin agente - abandonando)
same => n,Set(CDR(userfield)=ABANDONED)
same => n,AGI(mark_abandoned.py,${CALL_ATTEMPT_ID})
same => n,Playback(im-sorry)
same => n,Hangup()

; Handler de hangup: LIBERAR AGENTE cuando la llamada termina
exten => h,1,NoOp(=== HANGUP: Liberando agente ${AGENT_EXTENSION} ===)
same => n,AGI(dialer_release_agent.py)
same => n,NoOp(Agente liberado)

; Handler para auto-answer en canal del agente (predictivo)
[predictive-set-header]
exten => s,1,Set(PJSIP_HEADER(add,Alert-Info)=answer-after=0)
same => n,Set(PJSIP_HEADER(add,Call-Info)=<sip:broadworks.net>;answer-after=0)
same => n,Return()
