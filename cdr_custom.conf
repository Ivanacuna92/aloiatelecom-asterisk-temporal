;
; Mappings for custom config file
;
; To get your CSV output in a format tailored to your liking, uncomment the
; following lines and look for the output in the cdr-custom directory (usually
; in /var/log/asterisk).  Depending on which mapping you uncomment, you may see
; Master.csv, Simple.csv, or both.
;
; Alternatively, you can also specify the location of your CSV file using an
; absolute path, e.g.:
;
;     /srv/pbx/cdr/Master.csv => ${CSV_QUOTE(${CDR(clid)})},...
;
[mappings]
; Formato mejorado con columnas específicas de estado de llamadas
; Columnas: Cuenta,Origen,Destino,Contexto,Caller_ID,Canal_Origen,Canal_Destino,Ultima_App,Datos_App,
;           Inicio,Respuesta,Fin,Duracion_Total,Duracion_Facturada,Estado_Llamada,
;           Transferida,Completada,Fallida,No_Contesto,Ocupado,Congestion,Tipo_Llamada,
;           AMA_Flags,UniqueID,UserField,Hangupcause,Dialstatus
Master.csv => ${CSV_QUOTE(${CDR(accountcode)})},${CSV_QUOTE(${CDR(src)})},${CSV_QUOTE(${CDR(dst)})},${CSV_QUOTE(${CDR(dcontext)})},${CSV_QUOTE(${CDR(clid)})},${CSV_QUOTE(${CDR(channel)})},${CSV_QUOTE(${CDR(dstchannel)})},${CSV_QUOTE(${CDR(lastapp)})},${CSV_QUOTE(${CDR(lastdata)})},${CSV_QUOTE(${CDR(start)})},${CSV_QUOTE(${CDR(answer)})},${CSV_QUOTE(${CDR(end)})},${CSV_QUOTE(${CDR(duration)})},${CSV_QUOTE(${CDR(billsec)})},${CSV_QUOTE(${CDR(disposition)})},${CSV_QUOTE(${IF($["${CDR(lastapp)}" = "Transfer"]?SI:NO)})},${CSV_QUOTE(${IF($["${CDR(disposition)}" = "ANSWERED"]?SI:NO)})},${CSV_QUOTE(${IF($["${CDR(disposition)}" = "FAILED"]?SI:NO)})},${CSV_QUOTE(${IF($["${CDR(disposition)}" = "NO ANSWER"]?SI:NO)})},${CSV_QUOTE(${IF($["${CDR(disposition)}" = "BUSY"]?SI:NO)})},${CSV_QUOTE(${IF($["${CDR(disposition)}" = "CONGESTION"]?SI:NO)})},${CSV_QUOTE(${IF($[${LEN(${CDR(dstchannel)})} > 0]?SALIENTE:ENTRANTE)})},${CSV_QUOTE(${CDR(amaflags)})},${CSV_QUOTE(${CDR(uniqueid)})},${CSV_QUOTE(${CDR(userfield)})},${CSV_QUOTE(${CDR(hangupcause)})},${CSV_QUOTE(${DIALSTATUS})}
