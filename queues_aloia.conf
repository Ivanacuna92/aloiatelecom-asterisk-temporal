  ;=======================================
  ; Queues Configuration para AloiaTelecom
  ;=======================================

  [general]
  persistentmembers = yes
  autofill = yes
  monitor-type = MixMonitor

  [soporte]
  strategy = ringall
  timeout = 30
  retry = 5
  maxlen = 100
  announce-frequency = 30
  announce-holdtime = yes
  announce-position = yes
  musicclass = default
  servicelevel = 60
  member => PJSIP/1000
  member => PJSIP/1001
  member => PJSIP/1002
  member => PJSIP/1003
  member => PJSIP/1004

  [ventas]
  strategy = rrmemory
  timeout = 30
  retry = 5
  maxlen = 100
  musicclass = default
  servicelevel = 60
  member => PJSIP/1005
  member => PJSIP/1006
  member => PJSIP/1007

  [cobranzas]
  strategy = leastrecent
  timeout = 30
  retry = 5
  maxlen = 100
  musicclass = default
  servicelevel = 60
  member => PJSIP/1008
  member => PJSIP/1009

; Cola para transferencias del sistema Blaster
[blaster-queue]
strategy = ringall
timeout = 30
retry = 5
maxlen = 100
announce-frequency = 30
announce-holdtime = yes
announce-position = no
musicclass = default
servicelevel = 60
; Agrega aquí los miembros que recibirán llamadas de blaster
; member => PJSIP/2101
; member => PJSIP/1000
