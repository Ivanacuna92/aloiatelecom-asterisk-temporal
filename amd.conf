; ============================================================
; ALOIA TELECOM - AMD Configuration
; Answering Machine Detection (AMD) Settings
; ============================================================
; FASE 2.1: Configuración de detección de contestadoras automáticas
;
; Este archivo contiene los valores predeterminados para AMD.
; Cada campaña puede personalizar estos valores en DialerSettings.
;
; IMPORTANTE: Copiar este archivo a /etc/asterisk/amd.conf en el servidor
; ============================================================

[amd]

; ===== PARÁMETROS DE DETECCIÓN =====

; initial_silence: Silencio máximo al inicio (ms)
; Si hay más silencio que este valor = probablemente máquina
; Rango típico: 2000-3000ms
initial_silence = 2500

; greeting: Duración máxima del saludo inicial (ms)
; Saludos largos = típico de contestadoras
; Rango típico: 1000-2000ms
greeting = 1500

; after_greeting_silence: Silencio después del saludo (ms)
; Contestadoras suelen tener pausa antes del beep
; Rango típico: 500-1000ms
after_greeting_silence = 800

; total_analysis_time: Tiempo total de análisis (ms)
; Máximo tiempo que AMD analizará antes de decidir
; Rango típico: 3000-5000ms
total_analysis_time = 5000

; min_word_length: Longitud mínima de una "palabra" (ms)
; Sonidos más cortos se ignoran (ruido)
; Rango típico: 80-150ms
min_word_length = 100

; maximum_word_length: Longitud máxima de una "palabra" (ms)
; Palabras muy largas = máquina
; Rango típico: 3000-5000ms
maximum_word_length = 5000

; silence_threshold: Umbral de silencio (dBm)
; Nivel de audio que se considera "silencio"
; Rango típico: 128-256 (default: 256)
silence_threshold = 256

; maximum_number_of_words: Número máximo de palabras
; Si excede este número = probablemente humano
; Rango típico: 2-5 (default: 3)
maximum_number_of_words = 3

; between_words_silence: Silencio entre palabras (ms)
; Rango típico: 50-100ms
between_words_silence = 50

; ===== NOTAS DE CONFIGURACIÓN =====
;
; VALORES CONSERVADORES (menos falsos positivos):
;   initial_silence = 3000
;   greeting = 2000
;   total_analysis_time = 6000
;
; VALORES BALANCEADOS (recomendado - default):
;   initial_silence = 2500
;   greeting = 1500
;   total_analysis_time = 5000
;
; VALORES AGRESIVOS (detección rápida):
;   initial_silence = 2000
;   greeting = 1000
;   total_analysis_time = 3500
;
; RESULTADOS DE AMD:
;   - HUMAN: Humano detectado → Continuar llamada
;   - MACHINE: Contestadora detectada → Colgar (FASE 2.1)
;   - NOTSURE: No está seguro → Tratar como humano
;   - HANGUP: Cliente colgó durante análisis
;
; CAUSAS POSIBLES (amd_cause):
;   - TOOLONG: Saludo muy largo (máquina)
;   - TOOLSHORT: Saludo muy corto
;   - INITIALSILENCE: Silencio inicial excesivo
;   - HUMAN: Detectó patrón humano
;   - MAXWORDS: Excedió número máximo de palabras (humano)
;   - MAXTIME: Se acabó el tiempo de análisis
;
; ============================================================
; TROUBLESHOOTING
; ============================================================
;
; PROBLEMA: Muchos falsos positivos (marca humanos como máquinas)
; SOLUCIÓN: Aumentar initial_silence, greeting, y total_analysis_time
;
; PROBLEMA: No detecta contestadoras
; SOLUCIÓN: Reducir initial_silence y greeting
;
; PROBLEMA: AMD toma mucho tiempo
; SOLUCIÓN: Reducir total_analysis_time (pero aumenta falsos positivos)
;
; RECOMENDACIÓN: Probar con llamadas reales y ajustar progresivamente
;
; ============================================================
