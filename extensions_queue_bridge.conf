; =====================================================
; BLASTER QUEUE - BRIDGE CONTEXTS
; =====================================================
; Contextos para el sistema de bridge entre llamadas
; de clientes y agentes del blaster queue
; =====================================================

; =====================================================
; Context: blaster-queue-bridge-redirect
; =====================================================
; Contexto temporal donde el agente espera mientras
; se configura el redirect al context de bridge
; =====================================================
[blaster-queue-bridge-redirect]
exten => s,1,NoOp(=== AGENT ANSWERED - INITIATING BRIDGE ===)
    same => n,NoOp(Customer Channel: ${CUSTOMER_CHANNEL})
    same => n,NoOp(Queue Entry ID: ${QUEUE_ENTRY_ID})
    same => n,NoOp(Agent Extension: ${AGENT_EXTENSION})
    same => n,Answer()
    ; Bridge directamente con el canal del cliente que está esperando
    same => n,Bridge(${CUSTOMER_CHANNEL},kKtT)
    same => n,NoOp(Bridge terminated)
    same => n,Hangup()

; =====================================================
; Context: bridge-both-customer
; =====================================================
; Contexto donde el cliente espera después del redirect
; Se hace bridge manual con el agente
; =====================================================
[bridge-both-customer]
exten => s,1,NoOp(=== CUSTOMER REDIRECTED TO BRIDGE ===)
    same => n,Answer()
    same => n,Wait(60)  ; Esperar para el bridge manual
    same => n,Hangup()

; =====================================================
; Context: bridge-both-agent
; =====================================================
; Contexto donde el agente espera después del redirect
; Se hace bridge manual con el cliente
; =====================================================
[bridge-both-agent]
exten => s,1,NoOp(=== AGENT REDIRECTED TO BRIDGE ===)
    same => n,Answer()
    same => n,Wait(60)  ; Esperar para el bridge manual
    same => n,Hangup()
