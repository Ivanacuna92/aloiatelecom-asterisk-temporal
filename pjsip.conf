; --- Transport ---
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; =============================================
; TelecomsXchange (TATA - Prime-LA)
; Tech Prefix: 32270#
; Auth por INVITE, no REGISTER
; =============================================
[telecomsxchange]
type=endpoint
context=from-trunk
disallow=all
allow=ulaw
allow=alaw
allow=gsm
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
outbound_auth=telecomsxchange-auth
aors=telecomsxchange-aor
from_domain=sip01.telecomsxchange.com
send_pai=yes
trust_id_outbound=yes

[telecomsxchange-auth]
type=auth
auth_type=userpass
username=aX09JbwZ
password=1HgPWget

[telecomsxchange-aor]
type=aor
contact=sip:sip01.telecomsxchange.com:5060
qualify_frequency=30

