; =====================================================
; DIALPLAN PARA MARCADORES AUTOMÁTICOS
; =====================================================
; Contextos para Marcador Progresivo y Predictivo
; Aloia Telecom Call Center

; =====================================================
; CONTEXTO: Marcador Progresivo
; =====================================================
; El marcador progresivo llama al cliente primero
; Cuando el cliente contesta, se le asigna un agente disponible
; Incluye hangup handler para liberar agente al colgar
; =====================================================

[from-dialer-progressive]
exten => s,1,NoOp(=== MARCADOR PROGRESIVO ===)
same => n,Set(CAMPAIGN_ID=${CAMPAIGN_ID})
same => n,Set(LEAD_ID=${LEAD_ID})
same => n,Set(CALL_ATTEMPT_ID=${CALL_ATTEMPT_ID})
same => n,Set(CDR(accountcode)=campaign_${CAMPAIGN_ID})
same => n,Answer()
same => n,Wait(1)

; Wait-loop: buscar agente cada 5s, máximo 6 intentos (30s total)
same => n,Set(RETRY=0)
same => n(retry_loop),AGI(dialer_find_agent.py,${CAMPAIGN_ID},${CALL_ATTEMPT_ID})
same => n,GotoIf($["${AGENT_EXTENSION}" != ""]?has_agent)
same => n,Set(RETRY=$[${RETRY} + 1])
same => n,GotoIf($[${RETRY} >= 6]?no_agent)
same => n,MusicOnHold(default,5)
same => n,Goto(retry_loop)

; Si HAY agente: conectar
same => n(has_agent),NoOp(Agente encontrado: ${AGENT_EXTENSION})
same => n,StopMusicOnHold()
same => n,Set(CDR(userfield)=CONNECTED)
same => n,Set(CALLERID(all)="${LEAD_NAME:-Cliente}" <${PHONE_NUMBER}>)
same => n,Set(RECORD_FILE=/var/spool/asterisk/monitor/recordings/progressive-${CALL_ATTEMPT_ID})
same => n,MixMonitor(${RECORD_FILE}.wav,b)
same => n,Set(PJSIP_HEADER(add,Alert-Info)=answer-after=0)
same => n,Dial(PJSIP/${AGENT_EXTENSION},30,tTkK)
same => n,Goto(call-end)

same => n(no_agent),NoOp(No hay agentes disponibles después de 30s)
same => n,StopMusicOnHold()
same => n,Set(CDR(userfield)=ABANDONED)
same => n,AGI(mark_abandoned.py,${CALL_ATTEMPT_ID})
same => n,Playback(sorry-call-back-later)
same => n,Goto(call-end)

same => n(call-end),NoOp(Fin de llamada progresiva)
same => n,Hangup()

; === HANGUP HANDLER === Libera agente al colgar
exten => h,1,NoOp(=== HANGUP PROGRESIVO === DIALSTATUS=${DIALSTATUS})
same => n,AGI(dialer_release_agent.py)

; =====================================================
; CONTEXTO: Marcador Predictivo
; =====================================================
; El marcador predictivo marca múltiples líneas simultáneamente
; Cuando un cliente contesta, se asigna a un agente disponible
; Si no hay agente, la llamada es "abandonada"
; Configurado según FASE 1.2 del plan de implementación
; =====================================================

[from-dialer-predictive]
exten => _X.,1,NoOp(=== PREDICTIVE DIALER CALL ===)
; Variables desde AMI: CAMPAIGN_ID, LEAD_ID, CALL_ATTEMPT_ID, PHONE_NUMBER, LEAD_NAME, AMD_ENABLED
same => n,NoOp(Variables: CAMPAIGN=${CAMPAIGN_ID} PHONE=${PHONE_NUMBER} LEAD=${LEAD_NAME})
same => n,Set(CDR(accountcode)=campaign_${CAMPAIGN_ID})
same => n,Answer()
same => n,Wait(0.5)

; === AMD (Answering Machine Detection) opcional ===
same => n,GotoIf($["${AMD_ENABLED}" != "1"]?skip_amd)
same => n,AMD(2500,1500,300,5000,100,25,3)
same => n,NoOp(AMD Result: ${AMDSTATUS} - Cause: ${AMDCAUSE})
same => n,GotoIf($["${AMDSTATUS}" = "MACHINE"]?amd_machine)
same => n(skip_amd),NoOp(AMD skip/HUMAN - continuando)

; === Wait-loop: buscar agente cada 5s, max reintentos según PREDICTIVE_MAX_WAIT_TIME ===
same => n,Set(MAX_RETRIES=$[${PREDICTIVE_MAX_WAIT_TIME:-30} / 5])
same => n,Set(RETRY=0)
same => n(retry_loop),AGI(dialer_find_agent.py,${CAMPAIGN_ID},${CALL_ATTEMPT_ID})
same => n,GotoIf($["${AGENT_EXTENSION}" != ""]?has_agent)
same => n,Set(RETRY=$[${RETRY} + 1])
same => n,GotoIf($[${RETRY} >= ${MAX_RETRIES}]?abandoned)
same => n,MusicOnHold(default,5)
same => n,Goto(retry_loop)

; === Agente encontrado: conectar ===
same => n(has_agent),NoOp(Agente encontrado: ${AGENT_EXTENSION} (intento ${RETRY}))
same => n,StopMusicOnHold()
same => n,Set(CDR(userfield)=$[${RETRY} > 0 ? "CONNECTED_DELAYED" : "CONNECTED"])
same => n,Set(CALLERID(all)="${LEAD_NAME:-Cliente}" <${PHONE_NUMBER}>)
same => n,Set(RECORD_FILE=/var/spool/asterisk/monitor/recordings/predictive-${CALL_ATTEMPT_ID})
same => n,MixMonitor(${RECORD_FILE}.wav,b)
same => n,Set(PJSIP_HEADER(add,Alert-Info)=answer-after=0)
same => n,Dial(PJSIP/${AGENT_EXTENSION},30,tT)
same => n,Goto(call-end)

; === Llamada ABANDONADA - no hay agente tras 30s ===
same => n(abandoned),NoOp(Llamada ABANDONADA - No hay agentes después de ${RETRY} intentos)
same => n,StopMusicOnHold()
same => n,Set(CDR(userfield)=ABANDONED)
same => n,AGI(mark_abandoned.py,${CALL_ATTEMPT_ID})
same => n,Playback(sorry-call-back-later)
same => n,Wait(1)
same => n,Goto(call-end)

; === AMD detectó máquina ===
same => n(amd_machine),NoOp(Contestadora detectada - colgando)
same => n,Set(CDR(userfield)=AMD_MACHINE)
same => n,Goto(call-end)

same => n(call-end),NoOp(Fin de llamada predictiva)
same => n,Hangup()

; === HANGUP HANDLER === Libera agente al colgar (FIX CRÍTICO)
exten => h,1,NoOp(=== HANGUP PREDICTIVO === DIALSTATUS=${DIALSTATUS})
same => n,AGI(dialer_release_agent.py)

; =====================================================
; CONTEXTO: Marcador Manual
; =====================================================
; El agente marca directamente desde su softphone
; La llamada sale desde from-internal
; =====================================================

[dialer-manual]
exten => _X.,1,NoOp(=== MARCADOR MANUAL ===)
same => n,Set(CALLERID(num)=${CAMPAIGN_CALLERID})
same => n,Set(CALLERID(name)=AloiaTelecom)
; Iniciar grabacion si hay CALL_ATTEMPT_ID (viene del backend via AMI)
same => n,GotoIf($["${CALL_ATTEMPT_ID}" = ""]?skip_record)
same => n,Set(RECORD_FILE=/var/spool/asterisk/monitor/recordings/manual-${CALL_ATTEMPT_ID})
same => n,MixMonitor(${RECORD_FILE}.wav,b)
same => n,Verbose(1,Recording started: ${RECORD_FILE}.wav)
same => n(skip_record),NoOp(Recording check complete)
; Prefijo BlackTeko: __TRUNK_PREFIX__ + 52 (Mexico) + numero
same => n,Dial(PJSIP/__TRUNK_PREFIX____COUNTRY_CODE__${EXTEN}@__TRUNK_NAME__,30,tTkK)
same => n,Goto(call-end,1)

same => n(call-end),NoOp(Fin de llamada manual)
same => n,Hangup()

; =====================================================
; CONTEXTO: Marcador Progresivo con Agente Pre-asignado
; =====================================================
; Usado por Preview Dialer - El agente YA está asignado
; La variable AGENT_EXTENSION viene del backend
; Cuando el cliente contesta, conecta directamente con el agente
; =====================================================

[dialer-progressive]
exten => s,1,NoOp(=== MARCADOR PREVIEW/PROGRESIVO (Agente Pre-asignado) ===)
same => n,NoOp(Variables: CAMPAIGN=${CAMPAIGN_ID} LEAD=${LEAD_ID} AGENT=${AGENT_EXTENSION})
same => n,Set(CAMPAIGN_ID=${CAMPAIGN_ID})
same => n,Set(LEAD_ID=${LEAD_ID})
same => n,Set(CALL_ATTEMPT_ID=${CALL_ATTEMPT_ID})
same => n,Set(AGENT_EXT=${AGENT_EXTENSION})
same => n,Set(CDR(accountcode)=campaign_${CAMPAIGN_ID})

; Verificar que tenemos la extensión del agente
same => n,GotoIf($["${AGENT_EXT}" = ""]?no-agent:has-agent)

same => n(has-agent),NoOp(Agente pre-asignado: ${AGENT_EXT})
same => n,Answer()
same => n,Wait(0.5)

; Iniciar grabacion con formato estandarizado
same => n,Set(RECORD_FILE=/var/spool/asterisk/monitor/recordings/progressive-${CALL_ATTEMPT_ID})
same => n,MixMonitor(${RECORD_FILE}.wav,b)
same => n,Verbose(1,Recording started: ${RECORD_FILE}.wav)

; Configurar CallerID para que el agente vea el número del cliente
same => n,Set(CALLERID(all)="Cliente" <${PHONE_NUMBER}>)

; Conectar directamente con el agente pre-asignado
same => n,NoOp(Conectando cliente con agente ${AGENT_EXT})
same => n,Dial(PJSIP/${AGENT_EXT},60,tTkKU(preview-answered,s,1(${CALL_ATTEMPT_ID})))
same => n,NoOp(DIALSTATUS: ${DIALSTATUS})
same => n,Goto(call-end)

same => n(no-agent),NoOp(ERROR: No se recibió AGENT_EXTENSION)
same => n,Hangup()

same => n(call-end),NoOp(Fin de llamada preview - DIALSTATUS=${DIALSTATUS})
same => n,Hangup()

; === HANGUP HANDLER === Libera agente al colgar
exten => h,1,NoOp(=== HANGUP PROGRESSIVE === DIALSTATUS=${DIALSTATUS})
same => n,AGI(dialer_release_agent.py)

; Subroutine cuando el agente contesta
[preview-answered]
exten => s,1,NoOp(=== AGENTE CONTESTO LLAMADA PREVIEW ===)
same => n,NoOp(Call Attempt ID: ${ARG1})
same => n,Set(CDR(userfield)=PREVIEW_CONNECTED)
same => n,Return()

; =====================================================
; CONTEXTO: Cola de Campaña
; =====================================================
; Coloca al cliente en cola hasta que haya agente disponible
; =====================================================

[campaign-queue]
exten => _X.,1,NoOp(Entrando a cola de campaña ${CAMPAIGN_ID})
same => n,Set(QUEUE=campaign_${CAMPAIGN_ID})
same => n,Answer()
same => n,Queue(${QUEUE},tTkK,,,,60)
same => n,Hangup()

; =====================================================
; HANDLERS DE EVENTOS
; =====================================================

[dialer-event-handler]
; Handler genérico de hangup - libera agente
exten => h,1,NoOp(Call Hangup - Channel: ${CHANNEL} DIALSTATUS=${DIALSTATUS})
same => n,AGI(dialer_release_agent.py)
same => n,Return()

; =====================================================
; AGI SCRIPTS NECESARIOS
; =====================================================
; Los siguientes scripts AGI deben estar en /usr/share/asterisk/agi-bin/
;
; 1. dialer_find_agent.py
;    - Busca un agente disponible en la campaña
;    - Retorna AGENT_EXTENSION a Asterisk
;    - Marca agente como BUSY + AgentSession.active_calls++
;    - Usado por: from-dialer-progressive y from-dialer-predictive
;
; 2. dialer_release_agent.py
;    - Libera agente al finalizar llamada (hangup handler)
;    - Marca Agent.status = AVAILABLE
;    - Decrementa AgentSession.active_calls
;    - Actualiza CallAttempt.ended_at
;    - Usado por: exten => h en todos los contextos de marcador
;
; 3. mark_abandoned.py
;    - Marca una llamada como abandonada
;    - Actualiza CallAttempt.was_abandoned = True
;    - Actualiza métricas de abandono en DialerSettings
;    - Usado por: from-dialer-predictive
;
; =====================================================

; =====================================================
; CONTEXTO: Supervisión (Whisper/Spy)
; =====================================================
; Permite a supervisores escuchar y susurrar a agentes
; - Spy: Escuchar sin que nadie lo sepa
; - Whisper: Hablar solo al agente (cliente no escucha)
; =====================================================

[whisper]
; Extensión dinámica - recibe la extensión del agente a espiar
; Soporta tanto extensión numérica como "s" (usado por WebRTC endpoint)
exten => _X.,1,NoOp(=== SUPERVISION WHISPER ===)
same => n,NoOp(Supervisor espiando agente: ${EXTEN})
same => n,NoOp(Target from variable: ${SPY_TARGET})
same => n,Answer()
same => n,Wait(1)
; ChanSpy options:
; w = whisper mode (supervisor habla solo al agente)
; q = quiet (no announce)
same => n,ChanSpy(PJSIP/${SPY_TARGET},wq)
same => n,Hangup()

; Extensión "s" para llamadas desde WebRTC endpoint
exten => s,1,NoOp(=== SUPERVISION WHISPER (WebRTC) ===)
same => n,NoOp(Target from variable: ${SPY_TARGET})
same => n,Answer()
same => n,Wait(1)
same => n,ChanSpy(PJSIP/${SPY_TARGET},wq)
same => n,Hangup()

[spy]
; Solo escuchar - sin poder hablar
exten => _X.,1,NoOp(=== SUPERVISION SPY ===)
same => n,NoOp(Supervisor escuchando agente: ${EXTEN})
same => n,NoOp(Target from variable: ${SPY_TARGET})
same => n,Answer()
same => n,Wait(1)
; ChanSpy options:
; q = quiet (no announce)
; o = only listen (read-only)
same => n,ChanSpy(PJSIP/${SPY_TARGET},qo)
same => n,Hangup()

; Extensión "s" para llamadas desde WebRTC endpoint
exten => s,1,NoOp(=== SUPERVISION SPY (WebRTC) ===)
same => n,NoOp(Target from variable: ${SPY_TARGET})
same => n,Answer()
same => n,Wait(1)
same => n,ChanSpy(PJSIP/${SPY_TARGET},qo)
same => n,Hangup()

; =====================================================
; SUPERVISION VIA AUDIOSOCKET (Sin consumir líneas de troncal)
; Usa Local channel para ChanSpy + AudioSocket para streaming
; El audio se transmite: Asterisk -> TCP -> Backend -> WebSocket -> Navegador
; =====================================================

[spy-audiosocket]
; Lado que ejecuta ChanSpy (llamado via Local channel)
exten => s,1,NoOp(=== SPY AUDIOSOCKET - ChanSpy Side ===)
same => n,NoOp(Espiando agente: ${SPY_TARGET})
same => n,Answer()
same => n,Wait(0.3)
; ChanSpy: q=quiet, o=only listen (solo escuchar)
same => n,ChanSpy(PJSIP/${SPY_TARGET},qo)
same => n,Hangup()

[spy-audiosocket-stream]
; Lado que conecta a AudioSocket (otro extremo del Local channel)
exten => s,1,NoOp(=== SPY AUDIOSOCKET - Stream Side ===)
same => n,NoOp(UUID: ${AUDIOSOCKET_UUID}, Server: ${AUDIOSOCKET_SERVER})
same => n,Answer()
same => n,Wait(0.2)
; Conectar a servidor AudioSocket del backend
same => n,AudioSocket(${AUDIOSOCKET_UUID},${AUDIOSOCKET_SERVER})
same => n,Hangup()

[whisper-audiosocket]
; Lado que ejecuta ChanSpy con whisper
exten => s,1,NoOp(=== WHISPER AUDIOSOCKET - ChanSpy Side ===)
same => n,NoOp(Whisper a agente: ${SPY_TARGET})
same => n,Answer()
same => n,Wait(0.3)
; ChanSpy: w=whisper (hablar al agente), q=quiet
same => n,ChanSpy(PJSIP/${SPY_TARGET},wq)
same => n,Hangup()

[whisper-audiosocket-stream]
; Lado que conecta a AudioSocket para whisper
exten => s,1,NoOp(=== WHISPER AUDIOSOCKET - Stream Side ===)
same => n,NoOp(UUID: ${AUDIOSOCKET_UUID}, Server: ${AUDIOSOCKET_SERVER})
same => n,Answer()
same => n,Wait(0.2)
same => n,AudioSocket(${AUDIOSOCKET_UUID},${AUDIOSOCKET_SERVER})
same => n,Hangup()

; =====================================================
; NOTAS DE IMPLEMENTACIÓN
; =====================================================
;
; MARCADOR MANUAL:
; - El agente controla cuándo marcar
; - Se origina desde el softphone del agente
; - Usa el contexto from-internal
;
; MARCADOR PROGRESIVO:
; - Marca solo cuando hay agentes disponibles
; - Cliente espera en música mientras busca agente
; - Delay configurable entre llamadas
; - Garantiza que no hay llamadas abandonadas
;
; MARCADOR PREDICTIVO:
; - Marca múltiples llamadas simultáneamente
; - Algoritmo predice disponibilidad de agentes
; - Puede generar llamadas abandonadas
; - Se ajusta automáticamente según tasa de abandono
; - Ratio configurable (llamadas:agentes)
;
; VARIABLES IMPORTANTES:
; - CAMPAIGN_ID: ID de la campaña
; - LEAD_ID: ID del lead/contacto
; - CALL_ATTEMPT_ID: ID del intento de llamada
; - AGENT_EXTENSION: Extensión del agente asignado
; - DIALSTATUS: Estado final de la llamada
;
; =====================================================
