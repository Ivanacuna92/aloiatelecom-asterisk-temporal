;=======================================
; Configuración PJSIP para AloiaTelecom
;=======================================

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=157.173.199.200
external_signaling_address=157.173.199.200

[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
external_media_address=157.173.199.200
external_signaling_address=157.173.199.200
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16

;=======================================
; Template para agentes WebRTC
;=======================================
[agent-template](!)
type=endpoint
context=aloia-agents
transport=transport-wss
disallow=all
allow=alaw
allow=ulaw
allow=opus
dtmf_mode=rfc4733
webrtc=yes
media_encryption=dtls
dtls_verify=no
dtls_cert_file=/etc/letsencrypt/live/garza.aloia.tech/fullchain.pem
dtls_private_key=/etc/letsencrypt/live/garza.aloia.tech/privkey.pem
dtls_setup=actpass
use_avpf=yes
ice_support=yes
rtcp_mux=yes
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
rtp_timeout=60
rtp_timeout_hold=600

[auth-template](!)
type=auth
auth_type=userpass
realm=asterisk

[aor-template](!)
type=aor
max_contacts=1
remove_existing=yes
qualify_frequency=30
qualify_timeout=3.0

