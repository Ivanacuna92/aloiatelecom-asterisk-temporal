;=======================================
; Trunk SIP - BlackTeko
; Switch: ConnexCS
; Auth: Por IP (157.173.199.200)
; Signaling OUT: __TRUNK_IP__:5060
; Codecs: ulaw, alaw, g722, g729, gsm, g723
; DTMF: RFC4733 (RFC2833)
;=======================================

[__TRUNK_NAME__-identify]
type=identify
endpoint=__TRUNK_NAME__
match=__TRUNK_IP__

[__TRUNK_NAME__-aor]
type=aor
contact=sip:__TRUNK_IP__:5060
qualify_frequency=60
qualify_timeout=3.0

[__TRUNK_NAME__]
type=endpoint
context=from-trunk
transport=transport-udp
aors=__TRUNK_NAME__-aor
disallow=all
allow=ulaw
allow=alaw
allow=g722
allow=g729
allow=gsm
allow=g723
dtmf_mode=rfc4733
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
from_user=__TRUNK_FROM_USER__
from_domain=157.173.199.200

