; ============================================================
; ALOIA TELECOM - Marcador Predictivo
; Context: from-dialer-predictive
; ============================================================
; FASE 1.2: Context básico para marcador predictivo
; FASE 2.2: Implementación de MusicOnHold y loop de espera
; ============================================================
;
; Uso:
;   Este context se ejecuta cuando el CLIENTE contesta la llamada
;   originada por el marcador predictivo.
;
; Flujo:
;   1. Cliente contesta → Answer()
;   2. Buscar agente disponible → AGI(dialer_find_agent.py)
;   3a. Si hay agente → Bridge directo
;   3b. Si NO hay agente → MusicOnHold + Loop de espera (máx 30s)
;   4. Timeout → Marcar como abandonada + Hangup
;
; Variables requeridas:
;   - CAMPAIGN_ID: ID de la campaña
;   - CALL_ATTEMPT_ID: ID del intento de llamada
;   - DIALER_MODE: Modo del marcador (PREDICTIVE/PROGRESSIVE)
;   - PREDICTIVE_MAX_WAIT_TIME: Timeout en segundos (default: 30)
;
; ============================================================

[from-dialer-predictive]

; ===== INICIO DE LLAMADA PREDICTIVA =====
exten => _X.,1,NoOp(=== PREDICTIVE DIALER CALL STARTED ===)
 same => n,Set(CAMPAIGN_ID=${CAMPAIGN_ID})
 same => n,Set(CALL_ATTEMPT_ID=${CALL_ATTEMPT_ID})
 same => n,Set(DIALER_MODE=${DIALER_MODE})
 same => n,Set(PHONE_NUMBER=${PHONE_NUMBER})
 same => n,Set(LEAD_NAME=${LEAD_NAME})
 same => n,Verbose(1,Campaign: ${CAMPAIGN_ID} | CallAttempt: ${CALL_ATTEMPT_ID} | Mode: ${DIALER_MODE} | Phone: ${PHONE_NUMBER})

 ; Contestar la llamada
 same => n,Answer()
 same => n,Verbose(1,Call answered by client)

 ; Pequeña pausa para estabilizar el audio
 same => n,Wait(0.5)

; ===== AMD (Answering Machine Detection) - FASE 2.1 =====
 ; Verificar si AMD está habilitado para esta campaña
 same => n,Set(AMD_ENABLED=${AMD_ENABLED:-0})
 same => n,GotoIf($["${AMD_ENABLED}" = "0"]?skip_amd)

 ; AMD está habilitado - configurar parámetros
 same => n,Verbose(1,AMD is ENABLED - Starting answering machine detection)
 same => n,Set(AMD_INITIAL_SILENCE=${AMD_INITIAL_SILENCE:-2500})
 same => n,Set(AMD_GREETING=${AMD_GREETING:-1500})
 same => n,Set(AMD_AFTER_GREETING_SILENCE=${AMD_AFTER_GREETING_SILENCE:-800})
 same => n,Set(AMD_TOTAL_TIME=${AMD_TOTAL_TIME:-5000})
 same => n,Set(AMD_MIN_WORD_LENGTH=${AMD_MIN_WORD_LENGTH:-100})
 same => n,Set(AMD_MAX_WORD_LENGTH=${AMD_MAX_WORD_LENGTH:-5000})

 ; Ejecutar AMD con parámetros configurados
 same => n,AMD(${AMD_INITIAL_SILENCE},${AMD_GREETING},${AMD_AFTER_GREETING_SILENCE},${AMD_TOTAL_TIME},${AMD_MIN_WORD_LENGTH},${AMD_MAX_WORD_LENGTH})

 ; Capturar resultado de AMD
 same => n,Set(AMDSTATUS=${AMDSTATUS})
 same => n,Set(AMDCAUSE=${AMDCAUSE})
 same => n,Verbose(1,AMD Result: Status=${AMDSTATUS} Cause=${AMDCAUSE})

 ; Procesar resultado con AGI (guardar en base de datos)
 same => n,AGI(process_amd_result.py,${CALL_ATTEMPT_ID},${AMDSTATUS},${AMDCAUSE})

 ; Si es MACHINE, colgar inmediatamente
 same => n,GotoIf($["${AMDSTATUS}" = "MACHINE"]?amd_machine_detected)

 ; Si es HUMAN, NOTSURE, o cualquier otro, continuar normal
 same => n,Verbose(1,AMD passed - Continuing with agent search)
 same => n,Goto(skip_amd)

 ; Rama: Máquina detectada
 same => n(amd_machine_detected),NoOp(*** ANSWERING MACHINE DETECTED ***)
 same => n,Verbose(1,Answering machine detected - Hanging up (Cause: ${AMDCAUSE}))
 same => n,Set(CDR(userfield)=AMD:MACHINE:${AMDCAUSE})

 ; OPCIONAL: Dejar mensaje de voz aquí si se desea en el futuro
 ; same => n,Playback(custom/voicemail-message)

 ; Colgar la llamada
 same => n,Hangup()

 ; Etiqueta para saltar AMD si está deshabilitado
 same => n(skip_amd),NoOp(AMD check complete or skipped)

; ===== BUSCAR AGENTE DISPONIBLE =====
 ; Primera búsqueda de agente
 same => n,Verbose(1,Running AGI to find available agent...)
 same => n,AGI(dialer_find_agent.py,${CAMPAIGN_ID},${CALL_ATTEMPT_ID})

 ; Verificar si se encontró agente
 same => n,GotoIf($["${AGENT_EXTENSION}" = ""]?no_agent:agent_found)

; ===== RAMA 1: AGENTE ENCONTRADO =====
 same => n(agent_found),NoOp(*** AGENT FOUND: ${AGENT_EXTENSION} ***)
 same => n,Verbose(1,Bridging call to agent ${AGENT_EXTENSION})
 same => n,Set(CDR(userfield)=AGENT:${AGENT_EXTENSION})

 ; Configurar CallerID para que el agente vea el numero del cliente
 same => n,NoOp(DEBUG: Setting CallerID - PHONE_NUMBER=${PHONE_NUMBER} LEAD_NAME=${LEAD_NAME})
 same => n,Set(CALLERID(all)="${LEAD_NAME:-Cliente}" <${PHONE_NUMBER}>)
 same => n,Set(CONNECTEDLINE(all)="${LEAD_NAME:-Cliente}" <${PHONE_NUMBER}>)

 ; Iniciar grabacion con formato estandarizado
 same => n,Set(RECORD_FILE=/var/spool/asterisk/monitor/recordings/predictive-${CALL_ATTEMPT_ID})
 same => n,MixMonitor(${RECORD_FILE}.wav,b)
 same => n,Verbose(1,Recording started: ${RECORD_FILE}.wav)

 ; Bridge con el agente (o = usa CallerID original de este canal)
 same => n,Dial(PJSIP/${AGENT_EXTENSION},30,tTgoI)

 ; Si el Dial termina (agente colgó, no contestó, etc)
 same => n,NoOp(Dial finished - Status: ${DIALSTATUS})
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?call_completed:call_failed)

 same => n(call_completed),Verbose(1,Call completed successfully)
 same => n,Set(DIALSTATUS=ANSWER)
 same => n,AGI(update_call_attempt.py)
 same => n,Hangup()

 same => n(call_failed),Verbose(1,Agent did not answer - Status: ${DIALSTATUS})
 same => n,Goto(no_agent)  ; Volver a buscar otro agente

; ===== RAMA 2: NO HAY AGENTE DISPONIBLE =====
 same => n(no_agent),NoOp(*** NO AGENT AVAILABLE ***)
 same => n,Verbose(1,No agent available - Client will wait with music)

 ; FASE 2.2: Configurar timeout de espera
 ; Espera indefinida: ciclos de 60 segundos hasta encontrar agente
 same => n,Set(MAX_WAIT=60)
 same => n,Verbose(1,Wait loop cycle: ${MAX_WAIT} seconds (infinite retry))

 ; Iniciar contador de tiempo
 same => n,Set(WAIT_START=${EPOCH})
 same => n,Set(RETRY_COUNT=0)

; ===== LOOP DE ESPERA CON MÚSICA =====
 same => n(wait_loop),NoOp(*** WAIT LOOP - Retry #${RETRY_COUNT} ***)

 ; FASE 2.2: Reproducir música de espera
 same => n,Verbose(1,Starting MusicOnHold...)
 same => n,StartMusicOnHold(dialer-hold)

 ; Esperar 5 segundos antes de reintentar
 same => n,Wait(5)

 ; Detener música
 same => n,StopMusicOnHold()

 ; Calcular tiempo transcurrido
 same => n,Set(ELAPSED=$[${EPOCH} - ${WAIT_START}])
 same => n,Verbose(1,Elapsed time: ${ELAPSED}/${MAX_WAIT} seconds)

 ; Si se cumplió el ciclo de 60s, reiniciar contador y seguir esperando
 same => n,GotoIf($[${ELAPSED} >= ${MAX_WAIT}]?reset_wait)
 same => n,Goto(continue_search)

 same => n(reset_wait),Verbose(1,Wait cycle completed (${ELAPSED}s) - restarting cycle)
 same => n,Set(WAIT_START=${EPOCH})
 same => n,Set(RETRY_COUNT=0)

 same => n(continue_search),NoOp(Continuing agent search)

 ; Incrementar contador de reintentos
 same => n,Set(RETRY_COUNT=$[${RETRY_COUNT} + 1])

 ; Buscar agente nuevamente
 same => n,Verbose(1,Retrying agent search (attempt #${RETRY_COUNT})...)
 same => n,AGI(dialer_find_agent.py,${CAMPAIGN_ID},${CALL_ATTEMPT_ID})

 ; Verificar si ahora hay agente
 same => n,GotoIf($["${AGENT_EXTENSION}" != ""]?agent_found)

 ; Todavía no hay agente, continuar loop
 same => n,Goto(wait_loop)

; ===== TIMEOUT ALCANZADO - LLAMADA ABANDONADA =====
 same => n(timeout_reached),NoOp(*** TIMEOUT REACHED - ABANDONED CALL ***)
 same => n,Verbose(1,No agent available after ${ELAPSED} seconds)
 same => n,Set(CDR(userfield)=ABANDONED:${ELAPSED}s)

 ; OPCIONAL: Reproducir mensaje de disculpa
 ; Descomentar si tienes los archivos de audio:
 ; same => n,Playback(im-sorry)
 ; same => n,Playback(all-circuits-busy-now)
 ; same => n,Playback(pls-try-again-later)

 ; Reproducir beep o tono antes de colgar
 same => n,Playtones(congestion)
 same => n,Wait(2)
 same => n,StopPlaytones()

 ; Marcar como abandonada en la base de datos
 same => n,Set(WAIT_TIME=${ELAPSED})
 same => n,Verbose(1,Marking call as ABANDONED with wait_time=${WAIT_TIME})
 same => n,AGI(mark_abandoned.py,${CALL_ATTEMPT_ID},${WAIT_TIME})

 ; Colgar
 same => n,Verbose(1,Call marked as ABANDONED - Hanging up)
 same => n,Hangup()

; ===== HANDLERS DE EVENTOS =====

; Handler de error
exten => e,1,NoOp(*** ERROR in predictive dialer ***)
 same => n,Verbose(1,Error occurred: ${EXTEN})
 same => n,AGI(mark_abandoned.py,${CALL_ATTEMPT_ID})
 same => n,Hangup()

; Handler de hangup (cliente colgó)
exten => h,1,NoOp(*** Call hungup by client ***)
 same => n,Verbose(1,Client hung up - CallAttempt: ${CALL_ATTEMPT_ID} - DIALSTATUS: ${DIALSTATUS})
 ; Actualizar estado final de la llamada
 same => n,GotoIf($["${DIALSTATUS}" = ""]?set_hangup)
 same => n,Goto(update_status)
 same => n(set_hangup),Set(DIALSTATUS=CANCEL)
 same => n(update_status),AGI(update_call_attempt.py)
 same => n,NoOp(Predictive dialer call finished)

; ============================================================
; FIN DE CONTEXT: from-dialer-predictive
; ============================================================


; ============================================================
; CONTEXT ALTERNATIVO - PROGRESSIVE DIALER
; (Para marcador progresivo - similar pero sin espera larga)
; ============================================================

[from-dialer-progressive]

exten => _X.,1,NoOp(=== PROGRESSIVE DIALER CALL ===)
 same => n,Set(CAMPAIGN_ID=${CAMPAIGN_ID})
 same => n,Set(CALL_ATTEMPT_ID=${CALL_ATTEMPT_ID})
 same => n,Answer()
 same => n,Wait(0.5)

 ; En progresivo solo intentamos una vez
 same => n,AGI(dialer_find_agent.py,${CAMPAIGN_ID},${CALL_ATTEMPT_ID})
 same => n,GotoIf($["${AGENT_EXTENSION}" = ""]?no_agent:agent_found)

