;
; Answering Machine Detection Configuration - OPTIMIZADO PARA ALOIA TELECOM
; Este archivo optimiza la detección de contestadoras automáticas
;

[general]
; === TIEMPO DE ANÁLISIS ===
total_analysis_time = 5000      ; Máximo 5 segundos para decidir HUMAN vs MACHINE
                                ; Si se excede, retorna NOTSURE

; === UMBRAL DE SILENCIO ===
silence_threshold = 256         ; Nivel de ruido mínimo (0-32767) para considerar "sonido"
                                ; Valores más bajos = más sensible a ruido de fondo

; === DETECCIÓN DE SALUDO (GREETING) ===
initial_silence = 2500          ; Silencio inicial máximo antes del saludo (ms)
                                ; Si se excede = MACHINE (típico de contestadoras)
                                ; Ajustado para México: 2.5 segundos

after_greeting_silence = 800    ; Silencio DESPUÉS del saludo (ms)
                                ; Si se excede = HUMAN (humanos piensan antes de hablar)
                                ; 800ms es óptimo para detectar pausas naturales

greeting = 1500                 ; Duración máxima de un saludo (ms)
                                ; Si se excede = MACHINE (saludos largos = contestadora)
                                ; Ajustado: 1.5 segundos

; === DETECCIÓN DE PALABRAS ===
min_word_length = 100           ; Duración mínima de voz para ser considerada "palabra" (ms)
                                ; Filtra ruidos cortos como "eh", "um"

maximum_word_length = 5000      ; Duración máxima de una palabra (ms)
                                ; Si se excede = discurso largo = MACHINE

between_words_silence = 50      ; Silencio mínimo entre palabras (ms)
                                ; Para separar palabras individuales

maximum_number_of_words = 2     ; Máximo número de palabras en saludo
                                ; Ajustado a 2 para México:
                                ; - "Bueno" = 1 palabra = HUMAN
                                ; - "Hola buenos días" = 3 palabras = MACHINE
                                ; - "Diga" = 1 palabra = HUMAN
                                ; - "No puedo contestar..." = MACHINE

; === NOTAS DE OPTIMIZACIÓN ===
; Estos valores están optimizados para:
; - Llamadas salientes en México
; - Reducir falsos positivos (humanos detectados como máquinas)
; - Maximizar detección de contestadoras comerciales
;
; RESULTADOS ESPERADOS:
; - Precisión: 85-92% en detectar MACHINE
; - Falsos positivos: <5% (humanos como máquina)
; - Tiempo promedio de detección: 2-4 segundos
